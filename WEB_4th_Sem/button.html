<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Example</title>
</head>
<body>
    <form action="/server">
        <input type="checkbox" id="age" name="age" >
        <label for="age">I am above 18 years old</label><br><br>
        <hr>
        <div>
            <input type="radio" name="fruit" id="apple" value="apple">
            <label for="apple">Apple</label>
            <input type="radio" name="fruit" id="banana" value="banana">
            <label for="banana">Banana</label>
            <input type="radio" name="fruit" id="orange" value="orange">
            <label for="orange">Orange</label>
        </div>
        <button type="submit">Submit</button>
        <br>
        <hr>
        <div>
            <h4>Choose your subjects:</h4>
            <input type="checkbox" id="math" name="subject" value="math">
            <label for="math">Math</label>
            <input type="checkbox" id="science" name="subject" value="science">
            <label for="science">Science</label>
            <input type="checkbox" id="history" name="subject" value="history">
            <label for="history">History</label>
        </div>
            <button type="submit">Submit</button>
    </form>

</body>
</html>
